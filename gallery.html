<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — E-Cell MIET</title>
  
  <!-- React & Babel CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Custom Design Tokens (Sync with style.css) -->
  <link rel="stylesheet" href="style.css">
  
  <style type="text/tailwindcss">
    @layer utilities {
      .bg-glass {
        @apply bg-white/5 backdrop-blur-md border border-white/10;
      }
      .text-glow {
        text-shadow: 0 0 20px rgba(232, 0, 29, 0.4);
      }
      
      /* High-Impact Cinematic Horizontal Reveal */
      .reveal-card {
        opacity: 0;
        transform: translateX(-100px) scale(0.95);
        animation: cinematicReveal 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      }
    }

    @keyframes cinematicReveal {
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }
    
    /* Override some style.css defaults for Tailwind compatibility if needed */
    #gallery-root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
  </style>

  <script>
    tailwind.config = {
      darkMode: ['selector', '[data-theme="dark"]'],
      theme: {
        extend: {
          colors: {
            primary: 'hsl(0, 100%, 62%)',
            'primary-glow': 'hsla(0, 100%, 62%, 0.5)',
            'bg-main': 'hsl(0, 0%, 4%)',
            'bg-card': 'hsla(240, 8%, 8%, 0.85)',
          },
          fontFamily: {
            heading: ['Space Grotesk', 'sans-serif'],
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          },
          aspectRatio: {
            '4/3': '4 / 3',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 dark:bg-bg-main text-slate-900 dark:text-white selection:bg-primary selection:text-white overflow-x-hidden transition-colors duration-500">
  
  <div id="noise-overlay"></div>
  <canvas id="three-canvas"></canvas>

  <header id="main-header" class="fixed top-0 left-0 right-0 z-[1000] px-[5%] py-6 flex justify-between items-center transition-all duration-300">
    <a href="index.html" class="flex items-center gap-4 no-underline text-slate-900 dark:text-white group">
      <div class="w-12 h-12 bg-black flex items-center justify-center rounded-full border-2 border-slate-900 dark:border-white overflow-hidden shadow-lg transition-transform duration-500 group-hover:scale-110">
        <img src="logo.jpg" alt="Logo" class="w-full h-full object-cover">
      </div>
      <h1 class="text-xl font-heading font-bold m-0 tracking-tight">Ecell MIET</h1>
    </a>
    
    <nav id="main-nav" class="hidden md:flex gap-1">
      <a href="index.html" class="px-5 py-2 rounded-full text-sm font-semibold text-slate-600 dark:text-white/60 hover:text-primary hover:bg-slate-200/50 dark:hover:bg-white/5 transition-all">Home</a>
      <a href="aboutus.html" class="px-5 py-2 rounded-full text-sm font-semibold text-slate-600 dark:text-white/60 hover:text-primary hover:bg-slate-200/50 dark:hover:bg-white/5 transition-all">About</a>
      <a href="nova.html" class="px-5 py-2 rounded-full text-sm font-semibold text-slate-600 dark:text-white/60 hover:text-primary hover:bg-slate-200/50 dark:hover:bg-white/5 transition-all">Events</a>
      <a href="gallery.html" class="px-5 py-2 rounded-full text-sm font-semibold text-primary bg-slate-200/50 dark:bg-white/10 transition-all font-bold">Gallery</a>
      <a href="team.html" class="px-5 py-2 rounded-full text-sm font-semibold text-slate-600 dark:text-white/60 hover:text-primary hover:bg-slate-200/50 dark:hover:bg-white/5 transition-all">Team</a>
    </nav>
    
    <button class="theme-toggle px-3 py-3 rounded-full bg-slate-200/50 dark:bg-white/5 border border-slate-300 dark:border-white/10 hover:bg-primary/20 hover:border-primary/40 transition-all group" id="theme-toggle" aria-label="Toggle dark mode">
      <span class="theme-icon group-hover:scale-120 transition-transform">☀️</span>
    </button>
    <div class="hamburger md:hidden block cursor-pointer" id="hamburger">
      <span class="block w-6 h-0.5 bg-slate-900 dark:bg-white mb-1.5 transition-all"></span>
      <span class="block w-6 h-0.5 bg-slate-900 dark:bg-white mb-1.5 transition-all"></span>
      <span class="block w-6 h-0.5 bg-slate-900 dark:bg-white transition-all"></span>
    </div>
  </header>

  <main id="gallery-root" class="pt-32 pb-20"></main>

  <footer class="relative py-12 px-[5%] text-center overflow-hidden border-t border-slate-200 dark:border-white/5 bg-slate-100/80 dark:bg-black/40 backdrop-blur-lg">
    <div class="absolute -top-40 left-1/2 -translate-x-1/2 w-[80%] h-60 bg-primary/10 blur-[100px] rounded-full pointer-events-none"></div>
    <span class="text-2xl font-bold font-heading mb-6 block text-slate-900 dark:text-white">Ecell <em class="italic text-primary not-italic">MIET</em></span>
    <nav class="flex justify-center flex-wrap gap-x-8 gap-y-4 mb-8">
      <a href="index.html" class="text-slate-600 dark:text-white/60 hover:text-primary transition-colors">Home</a>
      <a href="aboutus.html" class="text-slate-600 dark:text-white/60 hover:text-primary transition-colors">About</a>
      <a href="nova.html" class="text-slate-600 dark:text-white/60 hover:text-primary transition-colors">Events</a>
      <a href="gallery.html" class="text-primary font-bold">Gallery</a>
      <a href="team.html" class="text-slate-600 dark:text-white/60 hover:text-primary transition-colors">Team</a>
    </nav>
    <p class="text-slate-500 dark:text-white/40 text-sm">© 2025 MIET Entrepreneurship Cell. All rights reserved.</p>
  </footer>

  <!-- React Application -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    const GALLERY_IMAGES = [
      { id: 1, src: 'assets/events/event-1.jpeg' },
      { id: 2, src: 'assets/events/event-2.jpeg' },
      { id: 3, src: 'assets/events/event-3.jpeg' },
      { id: 4, src: 'assets/events/event-4.jpeg' },
      { id: 5, src: 'assets/events/event-5.jpeg' },
      { id: 6, src: 'assets/events/event-6.jpeg' },
      { id: 7, src: 'assets/events/event-7.jpeg' },
      { id: 8, src: 'assets/events/event-8.jpeg' },
      { id: 9, src: 'assets/events/event-9.jpeg' },
      { id: 10, src: 'assets/events/event-10.jpeg' },
      { id: 11, src: 'assets/events/event-11.jpeg' },
      { id: 12, src: 'assets/events/event-12.jpeg' },
      { id: 13, src: 'assets/events/event-13.jpeg' },
      { id: 14, src: 'assets/events/event-14.jpeg' },
      { id: 15, src: 'assets/events/event-15.jpeg' },
      { id: 16, src: 'assets/events/event-16.jpeg' },
      { id: 17, src: 'assets/events/event-17.jpeg' },
      { id: 18, src: 'assets/events/event-18.jpeg' },
      { id: 19, src: 'assets/events/event-19.jpeg' },
      { id: 20, src: 'assets/events/event-20.jpeg' },
      { id: 21, src: 'assets/events/event-21.jpeg' },
      { id: 22, src: 'assets/events/event-22.jpeg' },
      { id: 23, src: 'assets/events/event-23.jpeg' },
      { id: 24, src: 'assets/events/event-24.jpeg' },
      { id: 25, src: 'assets/events/event-25.jpeg' },
      { id: 26, src: 'assets/events/event-26.jpeg' },
      { id: 27, src: 'assets/events/event-27.jpeg' },
      { id: 28, src: 'assets/events/event-28.jpeg' },
      { id: 29, src: 'assets/events/event-29.jpeg' },
      { id: 30, src: 'assets/events/event-30.jpeg' },
      { id: 31, src: 'assets/events/event-31.jpeg' },
      { id: 32, src: 'assets/events/event-32.jpeg' },
      { id: 33, src: 'assets/events/event-33.jpeg' },
      { id: 34, src: 'assets/events/event-34.jpeg' },
      { id: 35, src: 'assets/events/event-35.jpeg' },
      { id: 36, src: 'assets/events/event-36.jpeg' },
      { id: 37, src: 'assets/events/event-37.jpeg' },
      { id: 38, src: 'assets/events/event-38.jpeg' },
      { id: 39, src: 'assets/events/event-39.jpeg' },
      { id: 40, src: 'assets/events/event-40.jpeg' }
    ];

    function GalleryCard({ src, onClick, index }) {
      return (
        <div 
          className="reveal-card group relative overflow-hidden rounded-[1.5rem] bg-white dark:bg-bg-card border border-slate-200 dark:border-white/5 shadow-lg cursor-pointer mb-6 inline-block w-full scale-100 hover:scale-[1.02] transition-transform duration-700"
          style={{ animationDelay: `${index * 150}ms` }}
          onClick={onClick}
        >
          {/* Blurred Background Fill */}
          <div className="absolute inset-0 z-0">
            <img 
              src={src} 
              className="w-full h-full object-cover blur-3xl opacity-30 scale-125 transition-transform duration-1000 group-hover:scale-110" 
              aria-hidden="true"
            />
          </div>

          {/* Main Image */}
          <img 
            src={src} 
            alt="ECell Event" 
            className="relative z-10 w-full h-auto object-contain object-center transition-all duration-1000 group-hover:brightness-110"
            loading="lazy"
          />
          
          {/* Advanced Glassy Overlay on Hover */}
          <div className="absolute inset-0 z-20 bg-primary/5 opacity-0 group-hover:opacity-100 transition-all duration-700 flex items-center justify-center backdrop-blur-md">
             <div className="w-14 h-14 rounded-full bg-white/10 border border-white/20 flex items-center justify-center shadow-2xl transform translate-y-8 group-hover:translate-y-0 transition-all duration-700 ease-out">
                <svg xmlns="http://www.w3.org/2000/svg" className="h-7 w-7 text-slate-900 dark:text-white/80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                   <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
             </div>
             {/* Border Shine Effect */}
             <div className="absolute inset-0 border-2 border-primary/0 group-hover:border-primary/20 rounded-[1.5rem] transition-all duration-700"></div>
          </div>
        </div>
      );
    }

    function Lightbox({ image, onClose }) {
      if (!image) return null;

      return (
        <div className="fixed inset-0 z-[5000] flex items-center justify-center p-4 md:p-12 animate-in fade-in duration-500">
          <div className="absolute inset-0 bg-slate-100/95 dark:bg-black/98 backdrop-blur-2xl" onClick={onClose}></div>
          
          <button 
            className="absolute top-8 right-8 w-14 h-14 rounded-full bg-slate-200/50 dark:bg-white/5 border border-slate-300 dark:border-white/10 hover:bg-primary hover:border-primary text-slate-900 dark:text-white flex items-center justify-center transition-all duration-300 z-10 group"
            onClick={onClose}
          >
            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 group-hover:rotate-90 transition-transform duration-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>

          <div className="relative max-w-6xl w-full h-full flex items-center justify-center p-4">
            <div className="relative group/img h-full flex items-center">
              <img 
                src={image.src} 
                className="max-w-full max-h-full object-contain rounded-2xl shadow-[0_0_100px_rgba(0,0,0,0.2)] dark:shadow-[0_0_100px_rgba(0,0,0,0.8)] animate-in zoom-in-95 duration-700 ease-out border border-slate-200 dark:border-white/5"
              />
              <div className="absolute inset-0 rounded-2xl border border-white/10 pointer-events-none"></div>
            </div>
          </div>
        </div>
      );
    }

    function GalleryApp() {
      const [selectedImage, setSelectedImage] = useState(null);

      useEffect(() => {
        const handleEsc = (e) => {
          if (e.key === 'Escape') setSelectedImage(null);
        };
        window.addEventListener('keydown', handleEsc);
        return () => window.removeEventListener('keydown', handleEsc);
      }, []);

      return (
        <div className="max-w-[1500px] mx-auto px-6">
          <div className="text-center mb-20">
            <div className="flex justify-center mb-8 overflow-hidden">
              <span className="inline-flex items-center gap-2 px-6 py-2 rounded-full bg-slate-200/50 dark:bg-white/5 text-primary text-[0.7rem] font-black uppercase tracking-[0.25em] border border-slate-300 dark:border-white/10 shadow-2xl animate-in fade-in slide-in-from-bottom-full duration-1000">
                <span className="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
                Visual Archive
              </span>
            </div>

            <h2 className="text-6xl md:text-9xl font-heading font-extrabold mb-8 tracking-tighter leading-none italic overflow-hidden text-slate-900 dark:text-white">
               <span className="inline-block animate-in slide-in-from-bottom-full duration-[1.2s] ease-out">
                 Glimpses of <span className="text-slate-900 dark:text-white not-italic text-glow">Our Journey</span>
               </span>
            </h2>

            <p className="text-slate-600 dark:text-white/50 text-xl md:text-2xl max-w-2xl mx-auto font-medium tracking-tight animate-in fade-in slide-in-from-bottom-5 duration-1000 delay-500">
              A cinematic record of moments that define our pursuit of excellence, preserved in their natural perspective.
            </p>
          </div>

          <div className="columns-1 sm:columns-2 lg:columns-3 xl:columns-4 gap-6 space-y-6">
            {GALLERY_IMAGES.map((img, index) => (
              <GalleryCard 
                key={img.id} 
                src={img.src} 
                index={index}
                onClick={() => setSelectedImage(img)}
              />
            ))}
          </div>

          <Lightbox 
            image={selectedImage} 
            onClose={() => setSelectedImage(null)} 
          />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('gallery-root'));
    root.render(<GalleryApp />);
  </script>

  <!-- External Scene Persistence -->
  <script src="main.js"></script>
  <!-- Feedback System -->
  <script src="feedback.js" type="text/babel"></script>
  <script>
    // Header Scroll Effect
    window.addEventListener('scroll', () => {
      const header = document.getElementById('main-header');
      if (!header) return;
      if (window.scrollY > 50) {
        header.classList.add('bg-black/60', 'backdrop-blur-xl', 'border-b', 'border-white/5', 'py-4');
        header.classList.remove('py-6');
      } else {
        header.classList.remove('bg-black/60', 'backdrop-blur-xl', 'border-b', 'border-white/5', 'py-4');
        header.classList.add('py-6');
      }
    });

    // Mobile Menu Sync
    const hamburger = document.getElementById('hamburger');
    const nav = document.getElementById('main-nav');
    if (hamburger && nav) {
      hamburger.addEventListener('click', () => {
        nav.classList.toggle('hidden');
        nav.classList.toggle('flex');
        nav.classList.toggle('flex-col');
        nav.classList.toggle('absolute');
        nav.classList.toggle('top-full');
        nav.classList.toggle('left-0');
        nav.classList.toggle('right-0');
        nav.classList.toggle('bg-black/95');
        nav.classList.toggle('p-8');
      });
    }
  </script>
</body>
</html>
