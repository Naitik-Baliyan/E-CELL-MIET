            sans: ['Plus Jakarta Sans', 'sans-serif'],

    document.documentElement.setAttribute('data-theme', 'dark');

<body class="bg-bg-main text-white selection:bg-primary/30 overflow-x-hidden">

  <header id="main-header">
    <a href="index.html" class="logo-container">
      <div class="logo-mark"><img src="logo.jpg" alt="Logo"></div>

    </a>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>

    <nav id="main-nav">

        class="italic text-primary not-italic">MIET</em></span>
    <p class="text-white/40 text-sm">© 2025 MIET Entrepreneurship Cell. Dark Edition. <a href="admin.html"
        style="opacity: 0.1; font-size: 8px; text-decoration: none;">.</a></p>
  </footer>

  <script type="text/babel">

    const SUPABASE_URL = 'https://qrlpvpvkaiwaueajpkmz.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_oBu__impqaRKS3XMMK1BpQ_-r4zr7AG';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const FALLBACK_EVENTS = [
      {
        id: 1,

      },
      {
        id: 2,

        ],
        impact: "Established a powerful culture of dialogue, disruption, and direction for all those who dare to dream differently."
      },
      {
        id: 3,

        overview: "Inception – E-Cell MIET's flagship Startup Pitch Competition, organized under the prestigious National Entrepreneurship Challenge 2025 by IIT Bombay, turned out to be an outstanding success filled with innovation, energy, and entrepreneurial spirit.",
        highlights: [
          "Groundbreaking ideas pitched by student developers",
          "Comprehensive mentorship for presentation validation",
          "National challenge alignment under IIT Bombay's NEC framework"
        ],
        impact: "Nurtured the spirit of grassroots innovation, preparing student teams to build the scalable startups of tomorrow."
      },
      {
        id: 4,
        title: "E-Cell MIET at UPITS 2025",
        hook: "A week of innovation, culture & global connections.",
        overview: "From 25–29 September 2025, our E-Cell family participated in the 3rd edition of the UP International Trade Show (UPITS) at India Expo Centre & Mart, Greater Noida. The mega fair brought together 2,500+ exhibitors, 500+ international buyers, and over half a million visitors from 80+ countries.",
        highlights: [
          "Explored ODOP (One District One Product) pavilion featuring 343 artisan stalls",
          "Witnessed inauguration by PM Narendra Modi and reviewed preparation with CM Yogi Adityanath",
          "Engaged in direct MoUs with 27 universities to bridge innovation and academics"
        ],
        impact: "Obtained immense industrial and trade insight, empowering E-Cell with global networking opportunities."
      },
      {
        id: 5,
        title: "Building a Startup – The Role of a Founder CEO",
        hook: "Learning entrepreneurship and incubation with Physics Wallah School of Startup.",
        overview: "An insightful executive session held at MIET, successfully organized by MIET Incubation Forum along with the E-Cell team. We were honored to host Mr. S.M. Rounaqué Mustafa, sharing invaluable lessons on entrepreneurship and leadership.",
        highlights: [
          "Auspicious lamp-lighting by respected Director Mr. S.K. Singh",
          "Invaluable masterclass by Mr. S.M. Rounaqué Mustafa (Head, PW School of Startup)",
          "Real startup stories and morale-boosting discussions with CEO Mr. Rehan Ahmed"
        ],
        impact: "Left our audience of incubated startups and aspiring entrepreneurs deeply motivated and inspired."
      },
      {
        id: 6,
        title: "IPR Workshop: Innovation Meets Protection",
        hook: "Intellectual Property Rights awareness and competitive strategy.",
        overview: "A successful collaborative workshop organized by MIET Incubation Forum along with the E-Cell team and ZeusIP Advocates LLP. The session provided invaluable insights into protecting student innovations and maintaining market competitiveness.",
        highlights: [
          "Floral welcome and session guidance by Mr. Rohit Aggarwal (IPR Head, MIET)",
          "Legal expertise shared by Naveen Varma & Anmol Agarwal (ZeusIP Advocates LLP)",
          "Interactive IPR quiz with exciting goodies awarded to the top winners"
        ],
        impact: "Equipped student builders with essential awareness of legal protection for their original designs."
      },
      {
        id: 7,
        title: "Ignite to Impact",
        hook: "Where sparks of ideas turn into profitable startups.",
        overview: "An inspiring collaboration between MIET Incubation Forum, E-Cell MIET, and First500days, guiding student creators through the critical journey of transforming raw concepts into profitable business models.",
        highlights: [
          "Keynotes by serial investor Mr. Shivam Pal (Founder & Venture Partner, First500days)",
          "Actionable startup clarity and product-market fit strategies",
          "Dynamic Q&A session addressing early-stage funding and development roadblocks"
        ],
        impact: "Provided student founders with precise direction, clarity, and motivation for their business launches."
      },
      {
        id: 8,
        title: "NOVA 2025",
        hook: "An unforgettable celebration of ideas, innovation, and inspiration.",
        overview: "NOVA – A Burst of Brilliance was a sensational success! From thought-provoking guest panels to thrilling challenges, NOVA brought together visionaries and creators to collaborate and celebrate the spirit of campus entrepreneurship.",
        highlights: [
          "Impact keynotes by Prerna Rohilla (Founder, Mom Money Mindset)",
          "Leadership wisdom shared by Manish Garg (Mentor & Director of Engineering)",
          "Social Media Challenge felicitation and exciting Lucky Draw events"
        ],
        impact: "Achieved absolute engagement with aspiring student builders, celebrating talent with certificates and prizes."
      }
    ];

    function EventModal({ event, onClose }) {
      if (!event) return null;

      return (
        <div className="fixed inset-0 z-[2000] flex items-center justify-center p-4 md:p-8 animate-in fade-in duration-300">
          <div className="absolute inset-0 bg-black/95 backdrop-blur-xl" onClick={onClose}></div>

          <div className="relative w-full max-w-4xl bg-[#0d0d0d] border border-white/10 rounded-[2.5rem] p-8 md:p-16 shadow-[0_50px_100px_rgba(0,0,0,1)] overflow-y-auto max-h-[90vh] animate-in slide-in-from-bottom-10 duration-500">
            <button onClick={onClose} className="absolute top-8 right-8 w-12 h-12 rounded-full bg-white/5 flex items-center justify-center hover:bg-primary transition-colors group">
              <svg className="w-5 h-5 group-hover:rotate-90 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" strokeWidth="2.5" strokeLinecap="round" /></svg>
            </button>

            <div className="space-y-12">
              <div className="space-y-4">
                <span className="text-primary font-bold text-xs uppercase tracking-[0.3em] block">{event.hook}</span>
                <h2 className="text-5xl md:text-7xl font-heading font-black tracking-tighter text-white leading-none">{event.title}</h2>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-16">
                <div className="space-y-12">
                  <div>
                    <span className="text-white/20 text-[0.6rem] uppercase tracking-[0.3em] font-black block mb-6">Strategic Perspective</span>
                    <p className="text-white/70 text-xl leading-relaxed italic font-medium">{event.overview}</p>
                  </div>

                  <div>
                    <span className="text-white/20 text-[0.6rem] uppercase tracking-[0.3em] font-black block mb-6">Action Items</span>
                    <ul className="space-y-5">
                      {event.highlights.map((h, i) => (
                        <li key={i} className="flex gap-4 text-white/50 items-start group/li">
                          <span className="w-1.5 h-1.5 bg-primary rounded-full mt-2.5 shrink-0 shadow-[0_0_10px_var(--primary)]"></span>
                          <span className="text-lg font-medium group-hover/li:text-white transition-colors">{h}</span>
                        </li>
                      ))}
                    </ul>
                  </div>
                </div>

                <div className="bg-white/[0.02] border border-white/5 rounded-[2.5rem] p-10 flex flex-col justify-center gap-6">
                  <span className="text-white/20 text-[0.6rem] uppercase tracking-[0.3em] font-black block">Institutional Impact</span>
                  <p className="text-primary text-3xl font-bold leading-tight tracking-tight">
                    {event.impact}
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function EventCard({ event, onDetails }) {
      return (
        <div className="group relative overflow-hidden bg-bg-card border border-white/5 rounded-[2.5rem] p-8 md:p-12 transition-all duration-700 hover:-translate-y-3 hover:border-primary/40 hover:shadow-[0_40px_100px_rgba(232,0,29,0.15)] flex flex-col items-center text-center gap-8">
          <div className="space-y-4">
            <h3 className="text-4xl md:text-5xl font-heading font-black text-white tracking-tighter transition-colors group-hover:block transition-all">{event.title}</h3>
            <p className="text-white/40 font-bold text-[0.7rem] uppercase tracking-[0.25em] italic max-w-[250px] mx-auto">{event.hook}</p>
          </div>

          <button
            onClick={() => onDetails(event)}
            className="px-10 py-5 rounded-2xl bg-white/5 border border-white/10 text-white text-[0.65rem] font-black uppercase tracking-[0.3em] hover:bg-primary hover:border-primary hover:scale-105 active:scale-95 transition-all duration-500 shadow-xl"
          >
            Read Perspective
          </button>
        </div>
      );
    }

    function App() {
      const [selected, setSelected] = useState(null);
      const [events, setEvents] = useState([]);

      useEffect(() => {
        async function fetchEvents() {
          const { data, error } = await supabaseClient
            .from('events')
            .select('*')
            .order('created_at', { ascending: false });

          if (!error && data && data.length > 0) {
            const filteredFallback = FALLBACK_EVENTS.filter(
              fb => !data.some(d => d.title.toLowerCase() === fb.title.toLowerCase())
            );
            setEvents([...data, ...filteredFallback]);
          } else {
            setEvents(FALLBACK_EVENTS);
          }
        }
        fetchEvents();
      }, []);

      return (
        <>
          <div className="mb-32 text-center max-w-3xl mx-auto animate-in fade-in slide-in-from-bottom-10 duration-1000">
            <div className="inline-block px-4 py-1 rounded-full bg-white/5 border border-primary/20 text-[0.65rem] font-black uppercase tracking-[0.3em] text-primary mb-8">Case Studies — 2025</div>
            <h1 className="text-7xl md:text-9xl font-heading font-black tracking-tighter mb-10 leading-[0.8] text-white">THE INDEX<span className="text-primary">.</span></h1>
            <p className="text-white/50 text-xl font-medium tracking-tight leading-relaxed">Systematic documentation of institutional milestones and entrepreneurial breakthroughs at MIET.</p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
            {events.map(e => (
              <EventCard key={e.id} event={e} onDetails={setSelected} />
            ))}
          </div>

          <EventModal event={selected} onClose={() => setSelected(null)} />
        </>
      );
    }

    const domRoot = ReactDOM.createRoot(document.getElementById('events-root'));
    domRoot.render(<App />);
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="three-scene.js"></script>
  <script src="main.js"></script>
  <script src="feedback.js" type="text/babel"></script>
</body>

</html>
