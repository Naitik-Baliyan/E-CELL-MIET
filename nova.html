<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Index — Events 2025</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="stylesheet" href="style.css">
  
  <script>
    tailwind.config = {
      darkMode: ['selector', '[data-theme="dark"]'],
      theme: {
        extend: {
          colors: {
            primary: 'hsl(352, 100%, 45%)',
            'bg-main': 'hsl(0, 0%, 4%)',
            'bg-card': 'hsla(240, 8%, 8%, 0.85)',
          },
          fontFamily: {
            heading: ['Space Grotesk', 'sans-serif'],
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          }
        }
      }
    }
    document.documentElement.setAttribute('data-theme', 'dark');
  </script>
</head>
<body class="bg-bg-main text-white selection:bg-primary/30 overflow-x-hidden">
  
  <div id="noise-overlay"></div>
  <canvas id="three-canvas" class="fixed inset-0 z-0"></canvas>

  <header id="main-header">
    <a href="index.html" class="logo-container">
      <div class="logo-mark"><img src="logo.jpg" alt="Logo"></div>
      <h1>Ecell MIET</h1>
    </a>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
    <nav id="main-nav">
      <a href="index.html">Home</a>
      <a href="aboutus.html">About</a>
      <a href="nova.html" class="active">Events</a>
      <a href="gallery.html">Gallery</a>
      <a href="team.html">Team</a>
    </nav>
  </header>

  <main id="events-root" class="relative z-10 pt-32 pb-40 px-6 max-w-7xl mx-auto"></main>

  <footer class="relative py-12 px-[5%] text-center border-t border-white/5 bg-black/40 backdrop-blur-lg">
    <span class="text-2xl font-bold font-heading mb-6 block text-white">Ecell <em class="italic text-primary not-italic">MIET</em></span>
    <p class="text-white/40 text-sm">© 2025 MIET Entrepreneurship Cell. Dark Edition.</p>
  </footer>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const EVENTS_DATA = [
      {
        id: 1,
        title: "NOVA 2025",
        hook: "A high-octane immersion into the future of campus innovation.",
        overview: "NOVA 2025 served as the launchpad for institutional transformation, gathering visionary leaders and student innovators under one roof for a day of high-stakes discourse and interactive discovery.",
        highlights: [
          "Leadership masterclass by Manish Garg & Prerna Rohilla",
          "Institutional startup roadmap breakdown",
          "Interactive ecosystem mapping challenges",
          "High-value network expansion sessions"
        ],
        impact: "Catalyzed a 40% increase in active startup registrations and established a new benchmark for institutional engagement."
      },
      {
        id: 2,
        title: "Ignite to Impact",
        hook: "The architectural framework for building ventures that scale.",
        overview: "A strategic intensive focused on the critical gap between idea and execution. This program provides the frameworks needed to build validated, profitable startups.",
        highlights: [
          "Frameworks by Shivam Pal (Founder, First500days)",
          "Monetization model stress-testing",
          "Validation loops for early-stage founders",
          "Direct market-fit diagnostic sessions"
        ],
        impact: "Enabled 8 teams to pivot their business models into revenue-generating strategies within 30 days."
      },
      {
        id: 3,
        title: "IPR Workshop",
        hook: "Hard-coding legal protection into your creative DNA.",
        overview: "A deep dive into the legal architecture of innovation. Protecting your IP isn't just about safety; it's about building long-term institutional value.",
        highlights: [
          "Patent filing & strategy breakdowns",
          "Infringement case-study analytics",
          "Operationalizing IP in technical projects",
          "Strategic moat building for startups"
        ],
        impact: "Facilitated 12 provisional patent filings for student projects involving hardware and AI innovation."
      },
      {
        id: 4,
        title: "The Pitchathon",
        hook: "48 hours to transform raw vision into a powerful pitch.",
        overview: "A high-stakes pitching environment under the National Entrepreneurship Challenge, designed to refine how innovators communicate value to stakeholders.",
        highlights: [
          "Real-time feedback from ecosystem founders",
          "Narrative architectural coaching",
          "Data-driven deck construction",
          "Public pitching under extreme pressure"
        ],
        impact: "Selected top 3 teams for the regional finals with a combined valuation potential of ₹50 Lakhs."
      },
      {
        id: 5,
        title: "NEXUS – The Talk Show Experience",
        hook: "A platform for conversations that inspire innovation and thought leadership.",
        overview: "NEXUS was introduced as a platform to foster meaningful conversations, share real-world experiences, and connect aspiring innovators with industry insights. It aims to bridge the gap between experience and aspiration through open dialogue.",
        highlights: [
          "Insightful sessions by industry speakers",
          "Focus on real-world experiences and practical learnings",
          "High audience engagement and interaction",
          "Collaborative initiative by E-Cell MIET"
        ],
        impact: "NEXUS established a culture of dialogue and critical thinking, encouraging students to explore ideas beyond boundaries and think like innovators."
      }
    ];

    function EventModal({ event, onClose }) {
      if (!event) return null;
      
      return (
        <div className="fixed inset-0 z-[2000] flex items-center justify-center p-4 md:p-8 animate-in fade-in duration-300">
          <div className="absolute inset-0 bg-black/95 backdrop-blur-xl" onClick={onClose}></div>
          
          <div className="relative w-full max-w-4xl bg-[#0d0d0d] border border-white/10 rounded-[2.5rem] p-8 md:p-16 shadow-[0_50px_100px_rgba(0,0,0,1)] overflow-y-auto max-h-[90vh] animate-in slide-in-from-bottom-10 duration-500">
            <button onClick={onClose} className="absolute top-8 right-8 w-12 h-12 rounded-full bg-white/5 flex items-center justify-center hover:bg-primary transition-colors group">
                <svg className="w-5 h-5 group-hover:rotate-90 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" strokeWidth="2.5" strokeLinecap="round"/></svg>
            </button>

            <div className="space-y-12">
                <div className="space-y-4">
                   <span className="text-primary font-bold text-xs uppercase tracking-[0.3em] block">{event.hook}</span>
                   <h2 className="text-5xl md:text-7xl font-heading font-black tracking-tighter text-white leading-none">{event.title}</h2>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-16">
                    <div className="space-y-12">
                        <div>
                            <span className="text-white/20 text-[0.6rem] uppercase tracking-[0.3em] font-black block mb-6">Strategic Perspective</span>
                            <p className="text-white/70 text-xl leading-relaxed italic font-medium">{event.overview}</p>
                        </div>
                        
                        <div>
                            <span className="text-white/20 text-[0.6rem] uppercase tracking-[0.3em] font-black block mb-6">Action Items</span>
                            <ul className="space-y-5">
                                {event.highlights.map((h, i) => (
                                    <li key={i} className="flex gap-4 text-white/50 items-start group/li">
                                        <span className="w-1.5 h-1.5 bg-primary rounded-full mt-2.5 shrink-0 shadow-[0_0_10px_var(--primary)]"></span>
                                        <span className="text-lg font-medium group-hover/li:text-white transition-colors">{h}</span>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>

                    <div className="bg-white/[0.02] border border-white/5 rounded-[2.5rem] p-10 flex flex-col justify-center gap-6">
                        <span className="text-white/20 text-[0.6rem] uppercase tracking-[0.3em] font-black block">Institutional Impact</span>
                        <p className="text-primary text-3xl font-bold leading-tight tracking-tight">
                            {event.impact}
                        </p>
                    </div>
                </div>
            </div>
          </div>
        </div>
      );
    }

    function EventCard({ event, onDetails }) {
      return (
        <div className="group relative overflow-hidden bg-bg-card border border-white/5 rounded-[2.5rem] p-8 md:p-12 transition-all duration-700 hover:-translate-y-3 hover:border-primary/40 hover:shadow-[0_40px_100px_rgba(232,0,29,0.15)] flex flex-col items-center text-center gap-8">
          <div className="space-y-4">
             <h3 className="text-4xl md:text-5xl font-heading font-black text-white tracking-tighter transition-colors group-hover:block transition-all">{event.title}</h3>
             <p className="text-white/40 font-bold text-[0.7rem] uppercase tracking-[0.25em] italic max-w-[250px] mx-auto">{event.hook}</p>
          </div>
          
          <button 
            onClick={() => onDetails(event)}
            className="px-10 py-5 rounded-2xl bg-white/5 border border-white/10 text-white text-[0.65rem] font-black uppercase tracking-[0.3em] hover:bg-primary hover:border-primary hover:scale-105 active:scale-95 transition-all duration-500 shadow-xl"
          >
            Read Perspective
          </button>
        </div>
      );
    }

    function App() {
      const [selected, setSelected] = useState(null);

      return (
        <>
          <div className="mb-32 text-center max-w-3xl mx-auto animate-in fade-in slide-in-from-bottom-10 duration-1000">
            <div className="inline-block px-4 py-1 rounded-full bg-white/5 border border-primary/20 text-[0.65rem] font-black uppercase tracking-[0.3em] text-primary mb-8">Case Studies — 2025</div>
            <h1 className="text-7xl md:text-9xl font-heading font-black tracking-tighter mb-10 leading-[0.8] text-white">THE INDEX<span className="text-primary">.</span></h1>
            <p className="text-white/50 text-xl font-medium tracking-tight leading-relaxed">Systematic documentation of institutional milestones and entrepreneurial breakthroughs at MIET.</p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
            {EVENTS_DATA.map(e => (
              <EventCard key={e.id} event={e} onDetails={setSelected} />
            ))}
          </div>

          <EventModal event={selected} onClose={() => setSelected(null)} />
        </>
      );
    }

    const domRoot = ReactDOM.createRoot(document.getElementById('events-root'));
    domRoot.render(<App />);
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="three-scene.js"></script>
  <script src="main.js"></script>
  <script src="feedback.js" type="text/babel"></script>
</body>
</html>
